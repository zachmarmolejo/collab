name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bugcrowd program data
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/bugcrowd_data.json \
            -o bugcrowd_data.json
          echo "Fetched $(wc -c < bugcrowd_data.json) bytes"

      - name: Extract in-scope website targets to scope.txt
        run: |
          jq -r '
            .[]
            | .targets.in_scope[]?
            | select((.category // .type // "") == "website")
            | (.uri // .target // .name // empty)
            | select(. != null and . != "")
          ' bugcrowd_data.json | sort -u > scope.txt

          echo "scope.txt entries: $(wc -l < scope.txt)"
          echo "First 10:"
          head -10 scope.txt

      - name: Upload scope.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: scope
          path: scope.txt
          if-no-files-found: error
