name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bugcrowd program data
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/bugcrowd_data.json \
            -o /tmp/bugcrowd_data.json
          echo "Fetched $(wc -c < /tmp/bugcrowd_data.json) bytes"

      - name: Build scope.txt (extract + sanitize to bare domains)
        run: |
          jq -r '
            .[]
            | .targets.in_scope[]?
            | select((.category // .type // "") == "website")
            | (.uri // .target // .name // empty)
            | select(. != null and . != "")
          ' /tmp/bugcrowd_data.json \
          | sed -E '
              s#^[a-zA-Z][a-zA-Z0-9+.-]*://##;
              s#^[^/@]*@##;
              s#^\*\.##;
              s#[/?#].*##;
              s#:.*##
            ' \
          | tr '[:upper:]' '[:lower:]' \
          | grep -E '^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$' \
          | grep -Ev '^[0-9]+(\.[0-9]+)+$' \
          | sort -u > scope.txt

          echo "scope.txt entries: $(wc -l < scope.txt)"
          echo "First 10:"
          head -10 scope.txt

      - name: Commit scope.txt if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- scope.txt; then
            echo "scope.txt unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scope.txt
          git commit -m "chore: refresh scope.txt"
          git push
