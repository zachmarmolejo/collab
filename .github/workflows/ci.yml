name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bugcrowd program data
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/bugcrowd_data.json \
            -o /tmp/bugcrowd_data.json
          echo "Fetched $(wc -c < /tmp/bugcrowd_data.json) bytes"

      - name: Build scope.txt (extract + sanitize to bare domains)
        run: |
          jq -r '
            .[]
            | .targets.in_scope[]?
            | select((.category // .type // "") == "website")
            | (.uri // .target // .name // empty)
            | select(. != null and . != "")
          ' /tmp/bugcrowd_data.json \
          | sed -E '
              s#^[a-zA-Z][a-zA-Z0-9+.-]*://##;
              s#^[^/@]*@##;
              s#^\*\.##;
              s#[/?#].*##;
              s#:.*##
            ' \
          | tr '[:upper:]' '[:lower:]' \
          | grep -E '^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$' \
          | grep -Ev '^[0-9]+(\.[0-9]+)+$' \
          | sort -u > scope.txt

          echo "scope.txt entries: $(wc -l < scope.txt)"
          echo "First 10:"
          head -10 scope.txt

      - name: Open PR if scope.txt changed
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/refresh-scope
          base: main
          commit-message: "chore: refresh scope.txt"
          title: "chore: refresh scope.txt"
          body: |
            Automated refresh of `scope.txt` from the latest Bugcrowd in-scope website targets.
          add-paths: scope.txt
          delete-branch: true
